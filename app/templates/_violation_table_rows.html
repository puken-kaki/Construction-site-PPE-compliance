{% if violations %}
    {% for violation in violations %}
    <tr class="hover:bg-zinc-850/40 transition-colors align-middle">
        <td class="px-6 py-3">
            <div class="h-10 w-16 bg-zinc-950 border border-zinc-800 rounded overflow-hidden relative group cursor-zoom-in">
                <img src="/{{ violation.cropped_path[4:] }}" alt="Photo" class="w-full h-full object-cover grayscale hover:grayscale-0 transition-all">
            </div>
        </td>
        
        <td class="px-6 py-4 text-zinc-400 whitespace-nowrap">
            {{ violation.violation_time.strftime('%Y-%m-%d %H:%M:%S') }}
        </td>
        
        <td class="px-6 py-4 font-sans font-medium text-zinc-200">
            Camera #{{ violation.camera_id }}
        </td>
        
        <td class="px-6 py-4 whitespace-nowrap">
            <span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-red-950/40 text-red-400 border border-red-900/40">
                MISSING: {{ violation.violation_type }}
            </span>
        </td>
        
        <td class="px-6 py-4 text-right whitespace-nowrap">
            <a 
                href="/{{ violation.full_frame_path[4:] }}" 
                target="_blank" 
                class="text-zinc-500 hover:text-zinc-300 text-xs transition-colors underline decoration-zinc-700 underline-offset-4"
            >
                View Full Photo
            </a>
        </td>
    </tr>
    {% endfor %}
{% else %}
    <tr>
        <td colspan="5" class="px-6 py-12 text-center text-zinc-500 italic">
            No violations found for the selected criteria.
        </td>
    </tr>
{% endif %}
