<!DOCTYPE html>
<html lang="ru" class="h-full bg-slate-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PPE Monitoring{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.0"></script>
</head>
<body class="h-full flex flex-col text-slate-900 antialiased font-sans">

    {% if current_user.is_authenticated %}
    <nav class="border-b border-slate-200 bg-white">
        <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
            <div class="flex h-16 justify-between items-center">
                <div class="flex items-center space-x-8">
                    <span class="text-sm font-bold tracking-wider uppercase text-slate-800">PPE.Control</span>
                    <div class="hidden sm:flex sm:space-x-4">
                        <a href="{{ url_for('index') }}" class="px-3 py-2 text-sm font-medium {% if request.endpoint == 'index' %}text-slate-900 border-b-2 border-slate-900{% else %}text-slate-500 hover:text-slate-700{% endif %}">Home</a>
                        <a href="{{ url_for('settings') }}" class="px-3 py-2 text-sm font-medium {% if request.endpoint == 'settings' %}text-slate-900 border-b-2 border-slate-900{% else %}text-slate-500 hover:text-slate-700{% endif %}">Settings</a>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <span class="text-xs text-slate-500 bg-slate-100 px-2.5 py-1 rounded">{{ current_user.name }}</span>
                    <a href="{{ url_for('logout') }}" class="text-xs text-slate-400 hover:text-slate-600">Logout</a>
                </div>
            </div>
        </div>
    </nav>
    {% endif %}

    <main class="flex-1">
        <div class="mx-auto max-w-7xl p-4 sm:p-6 lg:p-8">
            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    {% for message in messages %}
                        <div class="mb-4 p-4 border-l-4 border-slate-700 bg-slate-100 text-sm text-slate-700" role="alert">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            {% block content %}{% endblock %}
        </div>
    </main>

</body>
</html>
